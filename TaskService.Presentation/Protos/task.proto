syntax = "proto3";

option csharp_namespace = "TaskService.Presentation.Protos";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

package task;

service Task {
  rpc GetCourseTasksWithScores (GetCourseTasksWithScoresRequest) returns (GetCourseTasksWithScoresResponse) {
    option (google.api.http) = {
      get: "/api/courses/{course_id}/tasks/scores"
    };
  }

  rpc GradeTask (GradeTaskRequest) returns (GradeTaskResponse) {
    option (google.api.http) = {
      post: "/api/tasks/grades"
      body: "*"
    };
  }

  rpc UpdateTaskGrade (UpdateTaskGradeRequest) returns (UpdateTaskGradeResponse) {
    option (google.api.http) = {
      put: "/api/tasks/grades"
      body: "*"
    };
  }

  rpc CreateTask (CreateTaskRequest) returns (CreateTaskResponse) {
    option (google.api.http) = {
      post: "/api/courses/{course_id}/tasks"
      body: "*"
    };
  }

  rpc UpdateTask (UpdateTaskRequest) returns (UpdateTaskResponse) {
    option (google.api.http) = {
      put: "/api/tasks/{task_id}"
      body: "*"
    };
  }

  rpc DeleteTask (DeleteTaskRequest) returns (DeleteTaskResponse) {
    option (google.api.http) = {
      delete: "/api/tasks/{task_id}"
    };
  }

  rpc GetCourseTasks (GetCourseTasksRequest) returns (GetCourseTasksResponse) {
    option (google.api.http) = {
      get: "/api/courses/{course_id}/tasks"
    };
  }
}

message GetCourseTasksRequest {
  string course_id = 1;
}

message CourseTaskItem {
  string task_id = 1;
  string title = 2;
  int32 max_score = 3;
}

message GetCourseTasksResponse {
  string course_id = 1;
  repeated CourseTaskItem tasks = 2;
  bool success = 3;
}

message GetCourseTasksWithScoresRequest {
  string course_id = 1;
}

message InternScore {
  string intern_id = 1;
  int32 score = 3;
}

message TaskWithScores {
  string task_id = 1;       
  string title = 2;         
  int32 max_score = 3;
  repeated InternScore scores = 4;
}

message GetCourseTasksWithScoresResponse {
  string course_id = 1;
  repeated TaskWithScores tasks = 2;
  bool success = 3;
}

message GradeTaskRequest {
  string task_id = 1;
  string intern_id = 2;
  int32 score = 3;
}

message GradeTaskResponse {
  bool success = 1;
}

message UpdateTaskGradeRequest {
  string task_id = 1;
  string intern_id = 2;
  int32 new_score = 3;
}

message UpdateTaskGradeResponse {
  bool success = 1;
}

message CreateTaskRequest {
  string course_id = 1;
  string title = 2; 
  int32 max_score = 3;
}

message CreateTaskResponse {
  string task_id = 1; 
  bool success = 2;
}

message UpdateTaskRequest {
  string task_id = 1;
  string title = 2;        
  int32 max_score = 3; 
}

message UpdateTaskResponse {
  bool success = 1;
}


message DeleteTaskRequest {
  string task_id = 1;
}

message DeleteTaskResponse {
  bool success = 1;
}